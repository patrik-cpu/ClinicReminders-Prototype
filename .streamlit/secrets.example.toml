[auth]
redirect_uri = "http://127.0.0.1:8501/oauth2callback"
cookie_secret = "replace-with-a-long-random-secret"

[auth.google]
client_id = "replace-with-google-oauth-client-id.apps.googleusercontent.com"
client_secret = "replace-with-google-oauth-client-secret"
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"

[google_resources]
SETTINGS_SHEET_ID = "replace-with-settings-sheet-id"
DATASETS_FOLDER_ID = "replace-with-datasets-folder-id"
FEEDBACK_SHEET_ID = "replace-with-feedback-sheet-id"
